# Nome DEVE ser igual ao Worker no Cloudflare Dashboard (agencia-toro-site).
# Se divergir, o bot cloudflare-workers-and-pages cria um 2º deploy automático.
name = "agencia-toro"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
main = "site/.output/server/index.mjs"

[assets]
directory = "site/.output/public"
binding = "ASSETS"

[vars]
API_URL = "https://api.agenciatoro.com.br"

# LEAD_INGEST_SECRET: use SECRET (Encrypt) no Dashboard — NÃO "Variable" em texto.
# Variables em texto somem a cada deploy do Git; Secrets persistem.
# Dashboard → Workers → agencia-toro-site → Settings → Variables → Add → Encrypt
# Nome: LEAD_INGEST_SECRET | Valor: igual ao deploy/.env da API
# Deploy manual: npx wrangler secret put LEAD_INGEST_SECRET

[observability]
enabled = true
