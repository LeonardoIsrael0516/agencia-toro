name = "agencia-toro-site"
compatibility_date = "2026-06-17"
compatibility_flags = ["nodejs_compat"]
main = "site/.output/server/index.mjs"

[assets]
directory = "site/.output/public"
binding = "ASSETS"

[vars]
API_URL = "https://api.agenciatoro.com.br"
# LEAD_INGEST_SECRET: configure como Secret no Cloudflare (Dashboard ou wrangler secret put).
# Deve ser o MESMO valor de LEAD_INGEST_SECRET no deploy/.env da API.

[observability]
enabled = true
