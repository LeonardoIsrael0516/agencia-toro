# api.agenciatoro.com.br -> API Agencia Toro (Docker, porta 3333)
#
# Instalacao (nginx + certbot):
#   sudo cp deploy/nginx/api.agenciatoro.com.br.conf /etc/nginx/sites-available/api.agenciatoro.com.br
#   sudo ln -sf /etc/nginx/sites-available/api.agenciatoro.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.agenciatoro.com.br
#
# Ou execute: sudo bash scripts/setup-api-subdomain-vps.sh

server {
    listen 80;
    listen [::]:80;
    server_name api.agenciatoro.com.br;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# Apos certbot, ele adiciona automaticamente o bloco listen 443 ssl.
